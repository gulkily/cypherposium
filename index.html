<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>what is rap? — the cypherposium</title>
  <meta name="description" content="The Cypherposium — an interdisciplinary rap conference at the MIT Media Lab. Salon/cypher 7.17, rap hackathon 7.18–7.19.">
  <meta property="og:title" content="what is rap? — the cypherposium">
  <meta property="og:description" content="An interdisciplinary rap conference at the MIT Media Lab — salon/cypher 7.17, rap hackathon 7.18–7.19">
  <meta name="theme-color" content="#dfddd6">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%23dfddd6'/%3E%3Ccircle cx='8' cy='8' r='4.5' fill='%231b1a19'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anonymous+Pro:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #dfddd6;
      --ink: #1b1a19;
      --box: #c3c3c0;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--bg);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(2rem, 6vh, 3.5rem);
      padding: clamp(2rem, 6vh, 4rem) 1.25rem;
      overflow-x: hidden;
    }

    .title {
      display: block;
      width: min(56vw, 420px);
      min-width: 250px;
      height: auto;
    }

    .polaroid {
      display: block;
      width: min(58vw, 435px);
      min-width: 270px;
      height: auto;
    }

    .events {
      display: flex;
      gap: clamp(2rem, 10vw, 5rem);
      align-items: flex-start;
      margin-top: clamp(0.5rem, 2.5vh, 1.5rem);
    }

    .event {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35em;
      text-decoration: none;
      color: var(--ink);
    }

    .date {
      font-family: 'Anonymous Pro', monospace;
      font-weight: 700;
      font-size: clamp(0.85rem, 2.1vw, 1rem);
    }

    .event-name {
      font-style: italic;
      font-weight: 400;
      font-size: clamp(1rem, 2.6vw, 1.25rem);
      background: var(--box);
      padding: 0.22em 0.85em;
      white-space: nowrap;
      transition: background 0.2s ease;
    }

    .event:hover .event-name,
    .event:focus-visible .event-name {
      background: #b2b2ae;
      text-decoration: underline;
      text-underline-offset: 0.25em;
    }

    @media (max-width: 400px) {
      .events { gap: 1.25rem; }
      .event-name { font-size: 0.95rem; }
    }
  </style>
</head>
<body>

  <h1><img class="title" src="assets/title-what-is-rap.png" alt="what is rap?" width="1384" height="322"></h1>

  <img class="polaroid" src="assets/polaroid.png" width="435" height="490"
       alt="Polaroid photo captioned &ldquo;mit rap club&rdquo;: a figure sitting inside a cube outlined in chalk-like text">

  <nav class="events" aria-label="Events">
    <a class="event" href="https://lu.ma/raphackathon" target="_blank" rel="noopener">
      <span class="date">7.18-7.19</span>
      <span class="event-name">HACKATHON</span>
    </a>
    <a class="event" href="https://lu.ma/rapmit" target="_blank" rel="noopener">
      <span class="date">7.17</span>
      <span class="event-name">SALON/CYPHER</span>
    </a>
  </nav>

</body>
</html>
